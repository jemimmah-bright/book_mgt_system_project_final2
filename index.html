<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOOK MANAGEMENT SYSTEM</title>
    <link rel="stylesheet" href="./index.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<h2 class="color">
    <img src="./image/5402751.png" alt="book-image" style="height: 60px; width: auto;" />
    BOOK MANAGEMENT SYSTEM
  </h2>

  <div class="main-container">
    <!-- Sidebar -->
    <div class="side-bar">
      <p class="nav-item">
        <a class="nav-link active" data-tab="all">
          <img src="./image/9211782.png" alt="books" style="height: 60px; width: auto;" />
          All Books
        </a>
      </p>
      <p data-tab="favorites">
        <img src="./image/vecteezy_heart-emoji-png-file_18824823.png" alt="Favorites" style="height: 60px; width: auto;" />
        Favorites
      </p>
      <p data-tab="read">
        <img src="./image/8896509.png" alt="Read" style="height: 60px; width: auto;" />
        Read
      </p>
      <p data-tab="unread">
        <img src="./image/9211783.png" alt="Unread" style="height: 60px; width: auto;" />
        Unread
      </p>
    </div>

    <!-- Content Area -->
    <div class="content-area">
      <div class="search-container">
        <input type="text" id="search" class="search-input" placeholder="Search by title or author" />
        <button type="button" class="search-bar">Search</button>
      </div>

      <button class="add" onclick="openAddModal()">Add Book</button>

      <div class="row" id="book-list"></div>
    </div>
  </div>

  <!-- Add Book Modal -->
  <div class="modal fade" id="addBookModal">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Add Book</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="addBookForm">
            <input type="text" id="title" class="form-control mb-2" placeholder="Title" required />
            <input type="text" id="author" class="form-control mb-2" placeholder="Author" required />
            <input type="text" id="genre" class="form-control mb-2" placeholder="Genre" required />
            <select id="status" class="form-control mb-2">
              <option value="Unread">Unread</option>
              <option value="Read">Read</option>
            </select>
            <input type="file" id="image" class="form-control mb-2" accept="image/*" required />
            <button type="submit" class="btn btn-primary">Save</button>
          </form>
        </div>
      </div>
    </div>
  </div>
           <script src="./index.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>  

</body>
</html>
