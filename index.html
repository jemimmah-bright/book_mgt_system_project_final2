<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOOK MANAGEMENT SYSTEM</title>
    <link rel="stylesheet" href="./index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
</head>
<body>
    <h2 class="tex-center" style="text-align: center; font-weight: bold;padding: 5px;font-size: 50px;">
        <img src="./image/5402751.png" alt="book-image" style="height: 60px;width: auto;" >
        BOOK MANAGEMENT SYSTEM
    </h2>

    <div class="mine-form tex-center">
        <form action="/search" method="get">
            <input type="text"name="search"placeholder="search from here" class="search-input">
            <button type="submit" class="seach-bar"> search</button>
        </form>
    </div>
        <header class="header-add tex-center mb-3">
           <div class="dropdown mt-3" style="margin-left: 300px;">
            <button class="btn btn-info dropdown-toggle" type="button"  id="dropdownMenuButton" data-bs-toggle="dropdown" aria-expanded="false" style="margin-left: 250px;">
                + Add Book</button>
                <div class="modal fade" id="addBookModal">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <div class="modal-header">
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                <form id="addBookForm">
                                    <input type="text" id="title" class="form-control mb-2" placeholder="Title" required>
                                    <input type="text" id="author" class="form-control mb-2" placeholder="Author" required>
                                    <input type="text" id="genre" class="form-control mb-2" placeholder="Genre" required>
                                    <select id="status" class="form-control mb-2">
                                        <option value="Unread">Unread</option>
                                        <option value="Read">Read</option>
                                        <option value="favorite">Favorites</option>
                                    </select>
                                    <input type="file" id="image" class="form-control mb-2" accept="image/*" required>
                                    <button type="submit" class="btn btn-primary">Save</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="side-bar" style="margin-left: -220px;">
                    <p class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#favorites"><img src="./image/9211783.png" alt="books" style="height: 60px;width: auto; color: white;">  All Books</p>
                    <p><img src="./image/vecteezy_heart-emoji-png-file_18824823.png" alt="blue heart" style="height: 60px;width: auto;"> Favorites</p>
                    <p><img src="./image/8896509.png" alt="read" style="height: 60px;width: auto;">  Read</p>
                    <p><img src="./image/9211782.png" alt="not-fav" style="height: 60px;width: auto;">Unread</p>
                    <p><img src="./image/2991983-middle-removebg-preview (1).png" alt="blue heart" style="height: 60px;width: auto;">Un-liked</p>
                   </div>

    <button class="add" onclick="openAddModal()">Add Book</button>
    <div class="modal fade" id="addBookModal">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add Book</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addBookForm">
                        <input type="text" id="title" class="form-control mb-2" placeholder="Title" required>
                        <input type="text" id="author" class="form-control mb-2" placeholder="Author" required>
                        <input type="text" id="genre" class="form-control mb-2" placeholder="Genre" required>
                        <select id="status" class="form-control mb-2">
                            <option value="Unread">Unread</option>
                            <option value="Read">Read</option>
                            <option value="favorite">Favorites</option>
                        </select>
                        <input type="file" id="image" class="form-control mb-2" accept="image/*" required>
                        <button type="submit" class="btn btn-primary">Save</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

           <script src="./index.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>  

</body>
</html>
